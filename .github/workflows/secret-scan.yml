name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Custom Iron Curtain Scan
        run: |
          echo "Scanning for company-specific patterns..."
          FOUND=0
          for pattern in "cedarbrook" "10\.17\.17\." "cfs-llc" "3commas" "lesnewski\.local" "BEGIN.*PRIVATE KEY"; do
            MATCHES=$(grep -rn "$pattern" --include="*.py" --include="*.json" --include="*.yml" --include="*.md" --include="*.txt" . 2>/dev/null | grep -v ".git/" | grep -v "secret-scan.yml" || true)
            if [ -n "$MATCHES" ]; then
              echo "FOUND pattern: $pattern"
              echo "$MATCHES"
              FOUND=$((FOUND+1))
            fi
          done
          if [ $FOUND -gt 0 ]; then
            echo "::error::Iron Curtain: $FOUND secret patterns detected!"
            exit 1
          fi
          echo "Iron Curtain scan passed."
