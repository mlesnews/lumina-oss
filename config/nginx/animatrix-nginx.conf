events {
    worker_connections 1024;
}

http {
    upstream animatrix {
        least_conn;
        server animatrix-primary-mark-i:11434;
        server animatrix-secondary-mark-ii:11434;
        server animatrix-secondary-mark-iii:11434;
        server animatrix-secondary-mark-iv:11434;
        server animatrix-secondary-mark-v:11434;
        server animatrix-primary-mark-vi:11434;
        server animatrix-secondary-mark-vii:11434;
    }

    server {
        listen 4000;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Simulation mode indicator
        location /simulation {
            access_log off;
            return 200 "{\"cluster\":\"animatrix\",\"type\":\"experiment\",\"mode\":\"simulation\"}\n";
            add_header Content-Type application/json;
        }

        # Ollama API proxy
        location / {
            proxy_pass http://animatrix;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Simulation-Mode "true";
            proxy_set_header X-Cluster-Type "animatrix";
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts (scaled for simulation)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}

