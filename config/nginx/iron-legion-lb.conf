events {
    worker_connections 1024;
}

http {
    upstream iron_legion {
        least_conn;
        server lumina-primary-mark-i:11434;
        server lumina-secondary-mark-ii:11434;
        server lumina-secondary-mark-iii:11434;
        server lumina-secondary-mark-iv:11434;
        server lumina-secondary-mark-v:11434;
        server lumina-primary-mark-vi:11434;
        server lumina-secondary-mark-vii:11434;
    }

    server {
        listen 3000;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Ollama API proxy
        location / {
            proxy_pass http://iron_legion;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}

